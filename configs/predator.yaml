# Predator 模型配置
MODEL:
  NAME: "Predator"
  BACKBONE: "ResUNetPPN2"
  INPUT_DIM: 3
  
  # 网络结构参数
  UNET:
    PLANES: [64, 128, 256, 512]
    CONV1_KERNEL_SIZE: 5
    
  # Transformer 参数
  TRANSFORMER:
    NUM_LAYERS: 6
    NUM_HEADS: 8
    HIDDEN_DIM: 512
    DROPOUT: 0.1
    
  # 匹配头
  MATCHING:
    FEATURE_DIM: 256
    TEMPERATURE: 0.1
    
# 数据集配置
DATASET:
  NAME: "ThreeDMatch"
  ROOT: "data/3dmatch"
  
  # 数据增强
  AUGMENTATION:
    ROTATION_RANGE: [-180, 180]
    SCALE_RANGE: [0.8, 1.2]
    NOISE_STD: 0.01
    
  # 采样参数
  NUM_POINTS: 5000
  VOXEL_SIZE: 0.05
  
# 训练配置
TRAIN:
  BATCH_SIZE: 1
  NUM_EPOCHS: 100
  LR: 0.001
  LR_DECAY: 0.1
  LR_DECAY_STEP: 50
  WEIGHT_DECAY: 0.0001
  
  # 优化器
  OPTIMIZER: "AdamW"
  
  # 损失函数权重
  LOSS:
    OVERLAP_WEIGHT: 1.0
    SALIENCY_WEIGHT: 1.0
    FEATURE_WEIGHT: 1.0
    TRANSFORMATION_WEIGHT: 1.0
    
# 验证配置
VAL:
  BATCH_SIZE: 1
  NUM_VIEWS: 100
  
# 推理配置
TEST:
  VOXEL_SIZE: 0.05
  RANSAC_ITERATIONS: 10000
  RANSAC_THRESHOLD: 0.05
  
# 设备配置
DEVICE:
  CUDA: true
  GPU_ID: 0
  
# 日志和检查点
LOGGING:
  LOG_DIR: "logs/predator"
  CHECKPOINT_DIR: "checkpoints/predator"
  SAVE_FREQ: 5
  VISUALIZE_FREQ: 10
